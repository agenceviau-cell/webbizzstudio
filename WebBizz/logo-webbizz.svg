<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <defs>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6C3CFF"/>
      <stop offset="0.5" stop-color="#FF4D8D"/>
      <stop offset="1" stop-color="#FF8A3D"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="96" y1="0" x2="320" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6C3CFF"/>
      <stop offset="0.45" stop-color="#FF4D8D"/>
      <stop offset="1" stop-color="#FF8A3D"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icône fond -->
  <rect width="76" height="76" rx="18" y="2" fill="url(#iconGrad)" filter="url(#glow)"/>

  <!-- Lettre W stylisée -->
  <path d="M16 22L26 54L38 32L50 54L60 22" stroke="white" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Texte WebBizz -->
  <text x="94" y="54" font-family="Poppins, Inter, sans-serif" font-weight="800" font-size="38" fill="url(#textGrad)" letter-spacing="-0.5">WebBizz</text>
</svg>
